function AuthScreen({onLogin}){
  const[mode,setMode]=useState("login");
  const[form,setForm]=useState({u:"",p:"",c:""});
  const[ob,setOb]=useState({med:"",sleep:7,goal:""});
  const[err,setErr]=useState("");
  const[nu,setNu]=useState(null);
  const[load,setLoad]=useState(false);
  const f=k=>e=>setForm(x=>({...x,[k]:e.target.value}));

  const doLogin=()=>{
    setLoad(true);setErr("");
    setTimeout(()=>{
      const u=db.get(`users:${form.u.toLowerCase()}`);
      if(!u||u.ph!==hash(form.p)){setErr("Usuário ou senha incorretos");setLoad(false);return;}
      db.set("session",{uid:u.id,uname:u.uname});onLogin(u);setLoad(false);
    },300);
  };
  const doSignup=()=>{
    setLoad(true);setErr("");
    setTimeout(()=>{
      if(!form.u.trim()||!form.p){setErr("Preencha todos os campos");setLoad(false);return;}
      if(form.p!==form.c){setErr("Senhas não coincidem");setLoad(false);return;}
      if(form.p.length<4){setErr("Senha mín. 4 caracteres");setLoad(false);return;}
      if(db.get(`users:${form.u.toLowerCase()}`)){setErr("Usuário já existe");setLoad(false);return;}
      const u={id:uid(),uname:form.u.trim(),ph:hash(form.p),at:Date.now()};
      setNu(u);setMode("onboard");setLoad(false);
    },300);
  };
  const doOnboard=()=>{
    setLoad(true);
    setTimeout(()=>{
      db.set(`users:${nu.uname.toLowerCase()}`,nu);
      db.set(`goals:${nu.id}`,{fixed:ob.goal?[{id:uid(),text:ob.goal,done:false}]:[],daily:[]});
      db.set(`xp:${nu.id}`,{xp:0,badges:[]});
      db.set("session",{uid:nu.id,uname:nu.uname});
      onLogin(nu);setLoad(false);
    },300);
  };

  return(
    <div className="fadein" style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:52,marginBottom:8}}>🧠</div>
        <div style={{fontSize:30,fontWeight:800,background:`linear-gradient(135deg,${C.pri},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CleanTDAH</div>
        <div style={{color:C.mut,fontSize:14,marginTop:4}}>Foco sem fricção</div>
      </div>
      <div style={{width:"100%",maxWidth:400}}>
        {mode==="onboard"?(
          <Card>
            <div style={{fontWeight:700,fontSize:19,marginBottom:4}}>Rápido! 3 perguntas ⚡</div>
            <div style={{color:C.mut,fontSize:13,marginBottom:20}}>Personalize sua experiência</div>
            <div style={{marginBottom:16}}>
              <Lbl>Você usa medicamento?</Lbl>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {["Nenhum",...Object.values(MEDS).map(m=>m.name)].map(m=>(
                  <button key={m} onClick={()=>setOb(x=>({...x,med:m}))} style={{background:ob.med===m?C.pri:C.surf,border:`1px solid ${ob.med===m?C.pri:C.bord}`,borderRadius:10,color:C.txt,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:500}}>{m}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <Lbl>Horas de sono desejadas</Lbl>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="range" min={4} max={12} step={0.5} value={ob.sleep} onChange={e=>setOb(x=>({...x,sleep:+e.target.value}))}/>
                <span style={{color:C.cyan,fontWeight:700,fontSize:20,minWidth:36}}>{ob.sleep}h</span>
              </div>
            </div>
            <div style={{marginBottom:18}}>
              <Lbl>Primeira meta fixa (opcional)</Lbl>
              <input placeholder="Ex: Tomar remédio às 8h" value={ob.goal} onChange={e=>setOb(x=>({...x,goal:e.target.value}))}
                style={{width:"100%",background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"11px 14px",fontSize:14,outline:"none"}}/>
            </div>
            <Btn onClick={doOnboard} disabled={load} style={{width:"100%"}}>{load?"Criando...":"Entrar no CleanTDAH →"}</Btn>
          </Card>
        ):(
          <Card>
            <div style={{display:"flex",gap:8,marginBottom:22}}>
              {["login","signup"].map(m=>(
                <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?C.pri:"transparent",border:`1px solid ${mode===m?C.pri:C.bord}`,borderRadius:10,color:mode===m?"#fff":C.mut,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:14}}>{m==="login"?"Entrar":"Criar conta"}</button>
              ))}
            </div>
            {[{k:"u",l:"Usuário",p:"@seunome",t:"text"},{k:"p",l:"Senha",p:"••••••••",t:"password"},...(mode==="signup"?[{k:"c",l:"Confirmar senha",p:"••••••••",t:"password"}]:[])].map(({k,l,p,t})=>(
              <div key={k} style={{marginBottom:14}}>
                <div style={{fontSize:12,color:C.mut,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</div>
                <input type={t} placeholder={p} value={form[k]} onChange={f(k)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():doSignup())}
                  style={{width:"100%",background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"12px 14px",fontSize:15,outline:"none"}}/>
              </div>
            ))}
            {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,background:C.red+"15",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>{err}</div>}
            <Btn onClick={mode==="login"?doLogin:doSignup} disabled={load} style={{width:"100%"}}>{load?"...":mode==="login"?"Entrar":"Criar conta"}</Btn>
            <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.mut}}>💾 Dados salvos no seu navegador</div>
          </Card>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   HOME TAB — Estilo TDAH Care
═══════════════════════════════════════ */
function HomeTab({userId,username,onXP,onBadge}){
  const[log,setLog]=useState({medKey:null,medTime:"",medTook:false,water:0,mood:null,sleep:null,activity:null,screen:null,registered:false});
  const[now,setNow]=useState(Date.now());
  const[showMedDetail,setShowMedDetail]=useState(false);
  const[xpData,setXpData]=useState({xp:0,badges:[]});

  useEffect(()=>{
    const l=db.get(`logs:${userId}:${today()}`);if(l)setLog(l);
    const x=db.get(`xp:${userId}`)||{xp:0,badges:[]};setXpData(x);
    const t=setInterval(()=>setNow(Date.now()),30000);
    return()=>clearInterval(t);
  },[userId]);

  const save=useCallback(upd=>{
    const nx={...log,...upd};setLog(nx);db.set(`logs:${userId}:${today()}`,nx);
  },[log,userId]);

  const register=()=>{
    let xpGain=30;const msgs=[];
    if(log.mood)xpGain+=5;
    if(log.sleep)xpGain+=10;
    if(log.medTook)xpGain+=15;
    if(log.water>=8){xpGain+=10;msgs.push("💧 Hidratado!");}
    if(log.activity&&log.activity!=="descanso")xpGain+=20;
    save({registered:true});
    onXP(xpGain,`✨ +${xpGain} XP registro diário!`);
    // Badge checks
    const x=db.get(`xp:${userId}`)||{xp:0,badges:[]};
    if(!x.badges.includes("first_log")){
      onBadge("first_log","🌱 Primeiro Passo","Primeiro registro feito!");
    }
    if(log.water>=8&&!x.badges.includes("hydrated")){
      onBadge("hydrated","💧 Hidratado","8+ copos de água!");
    }
  };

  // Medication phase from entered time
  const med=log.medKey?MEDS[log.medKey]:null;
  const elapsedMin=useMemo(()=>{
    if(!log.medTook||!log.medTime)return 0;
    const[h,m]=(log.medTime||"00:00").split(":").map(Number);
    const tookMs=new Date().setHours(h,m,0,0);
    return Math.floor((now-tookMs)/60000);
  },[log.medTime,log.medTook,now]);
  const phase=medPhase(med,elapsedMin);
  const progress=med&&med.duration>0?Math.min(100,(elapsedMin/med.duration)*100):0;

  // Stats from history
  const stats=useMemo(()=>{
    const days=getLast30();
    let logged=0,medDays=0;
    for(const d of days){
      const l=db.get(`logs:${userId}:${d}`);
      if(l?.registered)logged++;
      if(l?.medTook)medDays++;
    }
    return{logged,medPct:logged>0?Math.round((medDays/logged)*100):0};
  },[userId]);

  // Daily score preview
  const score=useMemo(()=>{
    let s=0;
    if(log.sleep){const h=+log.sleep;s+=Math.min(25,Math.round((h/8)*25));}
    const g=db.get(`goals:${userId}`)||{fixed:[],daily:[]};
    const all=[...g.fixed,...g.daily];
    const done=all.filter(x=>x.done).length;
    if(all.length>0)s+=Math.round((done/all.length)*25);
    if(log.activity&&log.activity!=="descanso")s+=25;
    if(log.screen){const sc={"<2h":25,"2-4h":20,"4-6h":10,"6h+":0};s+=(sc[log.screen]||0);}
    return Math.min(100,s);
  },[log,userId]);

  const lvInfo=getLvl(xpData.xp);
  const filled=[log.mood,log.sleep,log.medTook||log.medKey==="outro",log.water>0,log.screen,log.activity].filter(Boolean).length;

  return(
    <div style={{padding:"0 0 100px"}}>
      {/* Header Stats */}
      <div style={{background:`linear-gradient(160deg,${C.pri}30,${C.cyan}15)`,borderBottom:`1px solid ${C.bord}`,padding:"16px 16px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:12,color:C.mut}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
            <div style={{fontSize:13,color:C.cyan,fontWeight:600,marginTop:2}}>{lvInfo.icon} Nível {lvInfo.lvl} — {lvInfo.name}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:C.amb,fontWeight:800,fontSize:22}}>{xpData.xp} XP</div>
            <div style={{fontSize:11,color:C.mut}}>próx. nível: {lvInfo.next} XP</div>
          </div>
        </div>
        {/* XP bar */}
        <div style={{background:C.bord,borderRadius:99,height:6,marginBottom:14,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:99,width:`${lvInfo.pct}%`,background:`linear-gradient(90deg,${C.pri},${C.cyan})`,transition:"width 0.8s ease"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{v:score,l:"Score hoje",c:score>=75?C.grn:score>=50?C.amb:C.red},{v:stats.logged,l:"Dias registrados",c:C.cyan},{v:stats.medPct+"%",l:"Adesão remédio",c:C.pnk}].map(({v,l,c})=>(
            <div key={l} style={{flex:1,background:C.card,borderRadius:14,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.bord}`}}>
              <div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div>
              <div style={{color:C.mut,fontSize:10,marginTop:2,lineHeight:1.3}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {/* Quick Form */}
        <div style={{marginTop:16,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:17}}>Como você está agora? 👋</div>
          <div style={{fontSize:12,color:C.mut}}>Campos: {filled}/6 • Tudo vale XP!</div>
        </div>

        {/* Humor */}
        <Card style={{marginBottom:12}}>
          <Lbl color={C.pnk}>😊 Humor</Lbl>
          <div style={{display:"flex",gap:10,justifyContent:"space-around"}}>
            {["😔","😕","😐","🙂","😄"].map((e,i)=>(
              <button key={i} onClick={()=>save({mood:i+1})} style={{
                width:52,height:52,borderRadius:"50%",fontSize:26,
                background:log.mood===i+1?C.pnk+"30":"transparent",
                border:`2px solid ${log.mood===i+1?C.pnk:C.bord}`,
                cursor:"pointer",transition:"all 0.15s",
                transform:log.mood===i+1?"scale(1.15)":"scale(1)",
              }}>{e}</button>
            ))}
          </div>
        </Card>

        {/* Sono */}
        <Card style={{marginBottom:12}}>
          <Lbl color={C.pri}>🌙 Horas de sono</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {["4h","5h","6h","7h","8h","9h","10h","11h+"].map(h=>(
              <button key={h} onClick={()=>save({sleep:h})} style={{
                flex:"0 0 calc(25% - 6px)",background:log.sleep===h?C.pri+"30":C.surf,
                border:`1.5px solid ${log.sleep===h?C.pri:C.bord}`,borderRadius:12,
                color:log.sleep===h?C.pri:C.txt,padding:"10px 4px",cursor:"pointer",fontSize:14,fontWeight:700,textAlign:"center",
              }}>{h}</button>
            ))}
          </div>
        </Card>

        {/* Medicação */}
        <Card style={{marginBottom:12,boxShadow:med&&log.medTook?glow(med.color||C.pri):undefined}}>
          <Lbl color={C.cyan}>💊 Medicação</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
            {Object.entries(MEDS).map(([k,m])=>(
              <button key={k} onClick={()=>{save({medKey:k,medTook:false,medTime:""});}} style={{
                background:log.medKey===k?m.color+"25":C.surf,
                border:`1.5px solid ${log.medKey===k?m.color:C.bord}`,
                borderRadius:10,color:log.medKey===k?m.color:C.mut,
                padding:"9px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
              }}>{m.name}</button>
            ))}
          </div>

          {log.medKey&&log.medKey!=="outro"&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.mut,marginBottom:8}}>QUE HORAS VOCÊ TOMOU?</div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input type="time" value={log.medTime||""} onChange={e=>save({medTime:e.target.value,medTook:!!e.target.value})} style={{flex:1}}/>
                {log.medTook?<Tag color={C.grn}>✓ Tomado</Tag>:<Tag color={C.mut}>Não registrado</Tag>}
              </div>
            </div>
          )}

          {log.medKey==="outro"&&(
            <button onClick={()=>save({medTook:!log.medTook})} style={{
              width:"100%",background:log.medTook?C.grn+"20":C.surf,
              border:`1.5px solid ${log.medTook?C.grn:C.bord}`,borderRadius:12,
              color:log.medTook?C.grn:C.mut,padding:"12px",cursor:"pointer",fontWeight:700,fontSize:14
            }}>{log.medTook?"✓ Tomei o remédio hoje":"Marcar que tomei o remédio"}</button>
          )}

          {/* Visualizador de fase */}
          {med&&med.name!=="Outro"&&log.medTook&&log.medTime&&(
            <div style={{marginTop:8}} className="fadein">
              <div style={{background:C.bord,borderRadius:99,height:10,marginBottom:8,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:`${progress}%`,
                  background:progress<60?`linear-gradient(90deg,${med.color},${med.color}bb)`:progress<85?`linear-gradient(90deg,${C.amb},${med.color})`:`linear-gradient(90deg,${C.red},${C.amb})`,
                  transition:"width 1s ease",boxShadow:`0 0 10px ${med.color}60`}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.mut,marginBottom:8}}>
                <span>⏱ {elapsedMin<60?`${elapsedMin}min`:`${Math.floor(elapsedMin/60)}h${elapsedMin%60>0?` ${elapsedMin%60}min`:""}`} decorrido</span>
                <span>{med.duration-elapsedMin>0?`${Math.floor((med.duration-elapsedMin)/60)}h restante`:"Encerrado"}</span>
              </div>
              {phase&&(
                <div style={{background:phase.color+"15",border:`1px solid ${phase.color}40`,borderRadius:12,padding:"10px 14px"}}>
                  <div style={{color:phase.color,fontWeight:700,fontSize:14}}>{phase.label}</div>
                  <div style={{color:C.mut,fontSize:12,marginTop:2}}>{phase.sub}</div>
                </div>
              )}
            </div>
          )}
        </Card>

        {/* Água */}
        <Card style={{marginBottom:12}}>
          <Lbl color={C.cyan}>💧 Copos de água</Lbl>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>save({water:Math.max(0,log.water-1)})} style={{background:C.bord,border:"none",borderRadius:10,color:C.txt,width:40,height:40,cursor:"pointer",fontSize:22,fontWeight:700,flexShrink:0}}>−</button>
            <div style={{flex:1,display:"flex",gap:4,alignItems:"center"}}>
              {[...Array(8)].map((_,i)=>(
                <div key={i} onClick={()=>save({water:i+1})} style={{flex:1,height:28,borderRadius:6,background:i<log.water?C.cyan:C.bord,cursor:"pointer",transition:"background 0.2s"}}/>
              ))}
            </div>
            <div style={{color:C.cyan,fontWeight:800,fontSize:20,minWidth:28,textAlign:"center"}}>{log.water}</div>
            <button onClick={()=>save({water:Math.min(12,log.water+1)})} style={{background:C.cyan+"25",border:`1px solid ${C.cyan}60`,borderRadius:10,color:C.cyan,width:40,height:40,cursor:"pointer",fontSize:22,fontWeight:700,flexShrink:0}}>+</button>
          </div>
          {log.water>=8&&<div style={{color:C.grn,fontSize:12,marginTop:8,fontWeight:600}}>✓ Meta de hidratação atingida! 💧</div>}
        </Card>

        {/* Tempo de tela */}
        <Card style={{marginBottom:12}}>
          <Lbl color={C.amb}>📱 Tempo de tela</Lbl>
          <div style={{display:"flex",gap:8}}>
            {["<2h","2-4h","4-6h","6h+"].map(s=>(
              <button key={s} onClick={()=>save({screen:s})} style={{
                flex:1,background:log.screen===s?C.amb+"25":C.surf,
                border:`1.5px solid ${log.screen===s?C.amb:C.bord}`,borderRadius:12,
                color:log.screen===s?C.amb:C.mut,padding:"10px 4px",cursor:"pointer",fontSize:13,fontWeight:700,textAlign:"center"
              }}>{s}</button>
            ))}
          </div>
        </Card>

        {/* Atividade física */}
        <Card style={{marginBottom:16}}>
          <Lbl color={C.grn}>🏃 Atividade física</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {SPORTS.map(sp=>(
              <button key={sp.id} onClick={()=>save({activity:sp.id})} style={{
                flex:"0 0 calc(33% - 5.5px)",background:log.activity===sp.id?C.grn+"25":C.surf,
                border:`1.5px solid ${log.activity===sp.id?C.grn:C.bord}`,borderRadius:12,
                color:log.activity===sp.id?C.grn:C.mut,padding:"10px 4px",cursor:"pointer",
                fontSize:12,fontWeight:600,textAlign:"center",
              }}>
                <div style={{fontSize:20,marginBottom:3}}>{sp.icon}</div>{sp.label}
              </button>
            ))}
          </div>
        </Card>

        {/* Register button */}
        {!log.registered?(
          <button onClick={register} style={{
            width:"100%",background:`linear-gradient(135deg,${C.pri},${C.pnk})`,
            border:"none",borderRadius:16,color:"#fff",padding:"16px",
            cursor:"pointer",fontWeight:800,fontSize:17,
            boxShadow:glow(C.pri,15),marginBottom:8,
          }}>Registrar +{30+(log.mood?5:0)+(log.sleep?10:0)+(log.medTook?15:0)+(log.water>=8?10:0)+(log.activity&&log.activity!=="descanso"?20:0)} XP ✨</button>
        ):(
          <div style={{background:C.grn+"20",border:`1px solid ${C.grn}40`,borderRadius:16,padding:"14px",textAlign:"center",marginBottom:8}}>
            <div style={{color:C.grn,fontWeight:700,fontSize:15}}>✓ Registro do dia salvo!</div>
            <div style={{color:C.mut,fontSize:12,marginTop:4}}>Continue registrando ao longo do dia</div>
            <button onClick={()=>save({registered:false})} style={{marginTop:8,background:"transparent",border:"none",color:C.mut,fontSize:12,cursor:"pointer"}}>Atualizar registro</button>
          </div>
        )}

        {/* Badges earned */}
        {xpData.badges?.length>0&&(
          <Card style={{marginTop:4}}>
            <Lbl>🏅 Suas conquistas</Lbl>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {xpData.badges.map(bid=>{
                const b=ALL_BADGES.find(x=>x.id===bid);
                return b?(
                  <div key={bid} style={{background:C.amb+"15",border:`1px solid ${C.amb}30`,borderRadius:10,padding:"6px 12px",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{b.icon}</span>
                    <span style={{fontSize:12,color:C.amb,fontWeight:600}}>{b.name}</span>
                  </div>
                ):null;
              })}
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   POMODORO
═══════════════════════════════════════ */
function PomodoroTab({userId,onXP,onBadge}){
  const[pom,setPom]=useState({cycles:0,totalMin:0,neuronLv:0});
  const[mode,setMode]=useState("idle");
  const[secs,setSecs]=useState(25*60);
  const[running,setRunning]=useState(false);
  const[fd,setFd]=useState(25);
  const[bd,setBd]=useState(5);
  const ref=useRef(null);
  const pomRef=useRef(pom);pomRef.current=pom;
  const modeRef=useRef(mode);modeRef.current=mode;
  const fdRef=useRef(fd);fdRef.current=fd;
  const bdRef=useRef(bd);bdRef.current=bd;

  useEffect(()=>{const p=db.get(`pomodoro:${userId}`);if(p)setPom(p);},[userId]);
  const saveP=useCallback(p=>{setPom(p);db.set(`pomodoro:${userId}`,p);},[userId]);

  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){
            clearInterval(ref.current);
            const cur=pomRef.current;
            if(modeRef.current==="focus"){
              const nc=cur.cycles+1;
              const np={cycles:nc,totalMin:cur.totalMin+fdRef.current,neuronLv:Math.min(6,Math.floor(nc/2))};
              saveP(np);onXP(20,"🍅 +20 XP ciclo completo!");
              if(nc>=10&&!cur.badges?.includes("pomodoro_10"))onBadge("pomodoro_10","🍅 Tomate de Ouro","10 ciclos Pomodoro!");
              setMode("break");setSecs(bdRef.current*60);setRunning(false);
            }else{setMode("idle");setSecs(fdRef.current*60);setRunning(false);}
            return 0;
          }return s-1;
        });
      },1000);
    }
    return()=>clearInterval(ref.current);
  },[running,saveP,onXP,onBadge]);

  const adjustCycle=(dir)=>{
    const nc=Math.max(0,pom.cycles+dir);
    const np={...pom,cycles:nc,neuronLv:Math.min(6,Math.floor(nc/2))};
    saveP(np);
  };

  const mm=String(Math.floor(secs/60)).padStart(2,"0");
  const ss=String(secs%60).padStart(2,"0");
  const tot=mode==="focus"?fd*60:mode==="break"?bd*60:fd*60;
  const pct=mode==="idle"?0:Math.max(0,Math.min(100,((tot-secs)/tot)*100));
  const tc=mode==="break"?C.grn:mode==="focus"?C.cyan:C.pri;
  const R=80,circ=2*Math.PI*R;
  const lvLbls=["Dormindo 💤","Acordando ✨","Ativando 🔋","Conectando 🔗","Florescendo 🌸","Rede Neural 🕸️","Supernova 🌟"];

  return(
    <div style={{padding:"0 16px 100px",display:"flex",flexDirection:"column",gap:14,alignItems:"center"}}>
      {/* Neurônio */}
      <Card style={{width:"100%",textAlign:"center"}}>
        <div style={{fontSize:11,color:C.mut,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Seu Neurônio</div>
        <div style={{fontSize:13,color:pom.neuronLv===0?C.mut:C.cyan,marginBottom:4,fontWeight:600}}>{lvLbls[pom.neuronLv]}</div>
        <div style={{display:"flex",justifyContent:"center"}}><NeuronSVG level={pom.neuronLv} pulse={running&&mode==="focus"}/></div>
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:4}}>
          <div style={{textAlign:"center"}}><div style={{color:C.cyan,fontWeight:800,fontSize:22}}>{pom.cycles}</div><div style={{color:C.mut,fontSize:11}}>ciclos</div></div>
          <div style={{textAlign:"center"}}><div style={{color:C.pri,fontWeight:800,fontSize:22}}>{pom.totalMin}min</div><div style={{color:C.mut,fontSize:11}}>focado</div></div>
          <div style={{textAlign:"center"}}><div style={{color:C.grn,fontWeight:800,fontSize:22}}>Nv.{pom.neuronLv}</div><div style={{color:C.mut,fontSize:11}}>evolução</div></div>
        </div>
        {/* Cycle navigation */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginTop:12,paddingTop:10,borderTop:`1px solid ${C.bord}`}}>
          <div style={{fontSize:12,color:C.mut}}>Ajustar ciclos:</div>
          <button onClick={()=>adjustCycle(-1)} style={{background:C.bord,border:"none",borderRadius:8,color:C.txt,width:34,height:34,cursor:"pointer",fontSize:18}}>−</button>
          <span style={{color:C.cyan,fontWeight:700,fontSize:16,minWidth:16,textAlign:"center"}}>{pom.cycles}</span>
          <button onClick={()=>adjustCycle(1)} style={{background:C.pri+"25",border:`1px solid ${C.pri}`,borderRadius:8,color:C.pri,width:34,height:34,cursor:"pointer",fontSize:18}}>+</button>
        </div>
      </Card>

      {/* Timer */}
      <Card style={{width:"100%",textAlign:"center"}}>
        <div style={{fontSize:13,color:tc,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14,fontWeight:700}}>
          {mode==="idle"?"Pronto para focar":mode==="focus"?"⚡ Em foco":"☕ Pausa — respire"}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r={R} fill="none" stroke={C.bord} strokeWidth="10"/>
            <circle cx="100" cy="100" r={R} fill="none" stroke={tc} strokeWidth="10"
              strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
              transform="rotate(-90 100 100)" style={{transition:"stroke-dashoffset 1s linear",filter:`drop-shadow(0 0 10px ${tc}80)`}}/>
            <text x="100" y="92" textAnchor="middle" fontSize="38" fontWeight="700" fill={C.txt} fontFamily="monospace">{mm}:{ss}</text>
            <text x="100" y="116" textAnchor="middle" fontSize="13" fill={C.mut}>{mode==="idle"?"min":mode==="focus"?"foco":"pausa"}</text>
          </svg>
        </div>
        {mode==="idle"?(
          <>
            <div style={{display:"flex",gap:18,justifyContent:"center",marginBottom:16}}>
              {[{l:"Foco (min)",v:fd,s:v=>{setFd(v);setSecs(v*60);}},{l:"Pausa (min)",v:bd,s:setBd}].map(({l,v,s})=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:C.mut,marginBottom:5,textTransform:"uppercase"}}>{l}</div>
                  <input type="number" value={v} min={1} max={90} onChange={e=>s(Math.max(1,+e.target.value))}
                    style={{width:68,background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"8px",textAlign:"center",fontSize:18,fontWeight:700,outline:"none"}}/>
                </div>
              ))}
            </div>
            <Btn onClick={()=>{setMode("focus");setSecs(fd*60);setRunning(true);}} color={C.cyan} style={{width:"100%",fontSize:17}}>Iniciar Foco ⚡</Btn>
            <ReativarFoco onXP={onXP}/>
          </>
        ):(
          <>
            <div style={{display:"flex",gap:10}}>
              {running?<Btn onClick={()=>setRunning(false)} color={C.amb} style={{flex:1}}>⏸ Pausar</Btn>
                :<Btn onClick={()=>setRunning(true)} color={C.grn} style={{flex:1}}>▶ Continuar</Btn>}
              <Btn onClick={()=>{setRunning(false);setMode("idle");setSecs(fd*60);}} outline color={C.red} style={{flex:1}}>✕ Parar</Btn>
            </div>
            {mode==="break"&&!running&&(
              <Btn onClick={()=>{setMode("focus");setSecs(fd*60);setRunning(true);}} color={C.cyan} style={{width:"100%",marginTop:10}}>Próximo ciclo →</Btn>
            )}
          </>
        )}
      </Card>
    </div>
  );
}

/* ═══════════════════════════════════════
   COMMUNITY
═══════════════════════════════════════ */
function CommunityTab({userId,username}){
  const[posts,setPosts]=useState([]);
  const[view,setView]=useState("list");
  const[sel,setSel]=useState(null);
  const[cmts,setCmts]=useState([]);
  const[np,setNp]=useState({title:"",body:"",cat:"foco"});
  const[nc,setNc]=useState("");
  const[fc,setFc]=useState("all");

  useEffect(()=>{const p=db.get("forum:posts")||[];setPosts(p);},[]);
  const openPost=p=>{setSel(p);const c=db.get(`forum:comments:${p.id}`)||[];setCmts(c);setView("detail");};
  const timeAgo=ts=>{const m=Math.floor((Date.now()-ts)/60000);if(m<1)return"agora";if(m<60)return`${m}min`;if(m<1440)return`${Math.floor(m/60)}h`;return`${Math.floor(m/1440)}d`;};
  const filtered=fc==="all"?posts:posts.filter(p=>p.cat===fc);

  const submit=()=>{
    if(!np.title.trim())return;
    const p={id:uid(),authorId:userId,author:username,title:np.title.trim(),body:np.body.trim(),cat:np.cat,votes:0,voters:[],createdAt:Date.now(),commentCount:0};
    const u=[p,...posts];db.set("forum:posts",u);setPosts(u);setNp({title:"",body:"",cat:"foco"});setView("list");
  };
  const vote=pid=>{
    const u=posts.map(p=>{if(p.id!==pid||p.voters?.includes(userId))return p;return{...p,votes:p.votes+1,voters:[...p.voters,userId]};});
    db.set("forum:posts",u);setPosts(u);if(sel?.id===pid)setSel(u.find(p=>p.id===pid));
  };
  const comment=()=>{
    if(!nc.trim()||!sel)return;
    const c={id:uid(),authorId:userId,author:username,body:nc.trim(),createdAt:Date.now()};
    const uc=[...cmts,c];db.set(`forum:comments:${sel.id}`,uc);
    const up=posts.map(p=>p.id===sel.id?{...p,commentCount:(p.commentCount||0)+1}:p);
    db.set("forum:posts",up);setCmts(uc);setPosts(up);setNc("");
  };

  if(view==="create")return(
    <div style={{padding:"0 16px 100px"}} className="slideup">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:26}}>←</button>
        <div style={{fontWeight:700,fontSize:18}}>Nova postagem</div>
      </div>
      <Card>
        <Lbl>Categoria</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
          {CATS.map(cat=>(
            <button key={cat.id} onClick={()=>setNp(x=>({...x,cat:cat.id}))} style={{background:np.cat===cat.id?cat.color+"25":C.surf,border:`1px solid ${np.cat===cat.id?cat.color:C.bord}`,borderRadius:10,color:np.cat===cat.id?cat.color:C.mut,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>{cat.label}</button>
          ))}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:C.mut,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Título</div>
          <input placeholder="Sobre o que você quer falar?" value={np.title} onChange={e=>setNp(x=>({...x,title:e.target.value}))}
            style={{width:"100%",background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"12px 14px",fontSize:14,outline:"none"}}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:C.mut,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Descrição (opcional)</div>
          <textarea placeholder="Detalhe mais..." value={np.body} onChange={e=>setNp(x=>({...x,body:e.target.value}))}
            style={{width:"100%",background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"12px 14px",fontSize:14,minHeight:100,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <Btn onClick={submit} disabled={!np.title.trim()} style={{width:"100%"}}>Publicar →</Btn>
      </Card>
    </div>
  );

  if(view==="detail"&&sel)return(
    <div style={{padding:"0 16px 100px"}} className="slideup">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <button onClick={()=>{setView("list");setSel(null);}} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:26}}>←</button>
        <div style={{fontWeight:700,fontSize:16,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel.title}</div>
      </div>
      <Card style={{marginBottom:12}}>
        {(()=>{const cat=CATS.find(c=>c.id===sel.cat);return cat?<Tag color={cat.color}>{cat.label}</Tag>:null;})()}
        <div style={{fontWeight:700,fontSize:18,marginTop:8,marginBottom:8}}>{sel.title}</div>
        {sel.body&&<div style={{color:C.mut,fontSize:14,lineHeight:1.7,marginBottom:12}}>{sel.body}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:12,color:C.mut}}>@{sel.author} · {timeAgo(sel.createdAt)}</div>
          <button onClick={()=>vote(sel.id)} style={{background:C.pri+"20",border:`1px solid ${C.pri}40`,borderRadius:8,color:C.pri,padding:"6px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>▲ {sel.votes}</button>
        </div>
      </Card>
      <div style={{fontSize:13,color:C.mut,marginBottom:10,fontWeight:600}}>{cmts.length} comentário{cmts.length!==1?"s":""}</div>
      {cmts.map(c=>(
        <div key={c.id} style={{background:C.surf,border:`1px solid ${C.bord}`,borderRadius:12,padding:14,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.cyan,fontSize:13,fontWeight:700}}>@{c.author}</span><span style={{color:C.mut,fontSize:11}}>{timeAgo(c.createdAt)}</span></div>
          <div style={{color:C.txt,fontSize:14,lineHeight:1.5}}>{c.body}</div>
        </div>
      ))}
      <Card>
        <textarea value={nc} onChange={e=>setNc(e.target.value)} placeholder="Escreva um comentário..."
          style={{width:"100%",background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"12px",fontSize:14,height:80,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
        <Btn onClick={comment} disabled={!nc.trim()} small style={{width:"100%"}}>Comentar</Btn>
      </Card>
    </div>
  );

  return(
    <div style={{padding:"0 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,marginTop:2}}>
        <div style={{fontWeight:700,fontSize:20}}>Comunidade</div>
        <Btn onClick={()=>setView("create")} small color={C.pri}>+ Postar</Btn>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:10,marginBottom:14,scrollbarWidth:"none"}}>
        {[{id:"all",label:"Tudo",color:C.pri},...CATS].map(cat=>(
          <button key={cat.id} onClick={()=>setFc(cat.id)} style={{background:fc===cat.id?cat.color+"25":C.surf,border:`1px solid ${fc===cat.id?cat.color:C.bord}`,borderRadius:20,color:fc===cat.id?cat.color:C.mut,padding:"7px 16px",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>{cat.label}</button>
        ))}
      </div>
      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"50px 0",color:C.mut}}>
          <div style={{fontSize:44,marginBottom:14}}>🤫</div>
          <div style={{color:C.txt,fontWeight:700,fontSize:16,marginBottom:6}}>Nenhuma postagem ainda</div>
          <div style={{fontSize:13}}>Seja o primeiro!</div>
        </div>
      ):filtered.map(p=>{
        const cat=CATS.find(c=>c.id===p.cat);
        return(
          <div key={p.id} onClick={()=>openPost(p)} style={{background:C.card,border:`1px solid ${C.bord}`,borderRadius:14,padding:16,marginBottom:10,cursor:"pointer",transition:"border-color 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.pri+"60"} onMouseLeave={e=>e.currentTarget.style.borderColor=C.bord}>
            {cat&&<Tag color={cat.color}>{cat.label}</Tag>}
            <div style={{color:C.txt,fontWeight:700,fontSize:15,marginTop:6,lineHeight:1.3}}>{p.title}</div>
            {p.body&&<div style={{color:C.mut,fontSize:13,marginTop:5,lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.body}</div>}
            <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:C.mut}}>
              <span>@{p.author} · {timeAgo(p.createdAt)}</span>
              <span>▲ {p.votes} &nbsp;💬 {p.commentCount||0}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════
   GOALS
═══════════════════════════════════════ */
function GoalsTab({userId,onXP,onBadge}){
  const[goals,setGoals]=useState({fixed:[],daily:[]});
  const[nf,setNf]=useState("");const[nd,setNd]=useState("");

  useEffect(()=>{const g=db.get(`goals:${userId}`);if(g)setGoals(g);},[userId]);
  const sg=g=>{setGoals(g);db.set(`goals:${userId}`,g);};
  const add=t=>{const v=t==="fixed"?nf:nd;if(!v.trim())return;const g={...goals,[t]:[...goals[t],{id:uid(),text:v.trim(),done:false}]};sg(g);t==="fixed"?setNf(""):setNd("");};
  const tog=(t,id)=>{
    const g={...goals,[t]:goals[t].map(i=>i.id===id?{...i,done:!i.done}:i)};sg(g);
    const item=goals[t].find(i=>i.id===id);
    if(!item?.done){
      onXP(10,"🎯 +10 XP meta concluída!");
      const all=[...g.fixed,...g.daily];
      if(all.every(x=>x.done)&&all.length>0)onBadge("goal_ninja","🎯 Meta Ninja","Todas as metas concluídas!");
    }
  };
  const del=(t,id)=>sg({...goals,[t]:goals[t].filter(i=>i.id!==id)});

  const GL=({type,items,color,label,addV,setAddV})=>(
    <div>
      <div style={{fontSize:13,color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>{label}</div>
      {items.length===0&&<div style={{color:C.mut,fontSize:13,marginBottom:10}}>Nenhuma meta. Adicione uma!</div>}
      {items.map(i=>(
        <div key={i.id} style={{display:"flex",alignItems:"center",gap:10,background:C.surf,borderRadius:12,padding:"11px 14px",marginBottom:8,border:`1px solid ${i.done?color+"50":C.bord}`}}>
          <button onClick={()=>tog(type,i.id)} style={{width:24,height:24,borderRadius:7,background:i.done?color:"transparent",border:`2px solid ${i.done?color:C.bord}`,cursor:"pointer",color:"#fff",fontSize:14,flexShrink:0}}>{i.done?"✓":""}</button>
          <span style={{flex:1,color:i.done?C.mut:C.txt,fontSize:14,textDecoration:i.done?"line-through":"none"}}>{i.text}</span>
          <button onClick={()=>del(type,i.id)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:20,opacity:0.6}}>×</button>
        </div>
      ))}
      <div style={{display:"flex",gap:8}}>
        <input value={addV} onChange={e=>setAddV(e.target.value)} placeholder={`+ Nova meta ${type==="fixed"?"fixa":"diária"}...`} onKeyDown={e=>e.key==="Enter"&&add(type)}
          style={{flex:1,background:C.surf,border:`1px solid ${C.bord}`,borderRadius:10,color:C.txt,padding:"11px 14px",fontSize:14,outline:"none"}}/>
        <button onClick={()=>add(type)} style={{background:color+"20",border:`1px solid ${color}40`,borderRadius:10,color,padding:"11px 16px",cursor:"pointer",fontSize:20,fontWeight:700}}>+</button>
      </div>
    </div>
  );

  return(
    <div style={{padding:"0 16px 100px",display:"flex",flexDirection:"column",gap:14}}>
      <Card><GL type="fixed" items={goals.fixed} color={C.cyan} label="🔁 Metas fixas — rotina" addV={nf} setAddV={setNf}/></Card>
      <Card><GL type="daily" items={goals.daily} color={C.grn} label={`📅 Metas diárias — ${today()}`} addV={nd} setAddV={setNd}/></Card>
    </div>
  );
}

/* ═══════════════════════════════════════
   REPORT — Estilo TDAH Care
═══════════════════════════════════════ */
function ReportTab({userId}){
  const[view,setView]=useState("today"); // today | history
  const[report,setReport]=useState(null);
  const[generating,setGenerating]=useState(false);
  const[histReport,setHistReport]=useState(null);

  // Calculate report for a given date
  const calcReport=useCallback((date)=>{
    const log=db.get(`logs:${userId}:${date}`)||{};
    const goals=db.get(`goals:${userId}`)||{fixed:[],daily:[]};
    const pom=db.get(`pomodoro:${userId}`)||{cycles:0,totalMin:0};
    const sh=log.sleep?({4:4,5:5,6:6,7:7,8:8,9:9,10:10,"11h+":11}[log.sleep]||7):0;
    const sleepScore=Math.round(Math.min(25,(sh/8)*25));
    const all=[...goals.fixed,...goals.daily];
    const done=all.filter(g=>g.done).length;
    const goalsScore=all.length>0?Math.round((done/all.length)*25):0;
    const actScore=log.activity&&log.activity!=="descanso"?25:0;
    const scMap={"<2h":25,"2-4h":20,"4-6h":10,"6h+":0};
    const screenScore=log.screen?scMap[log.screen]||0:12;
    const total=sleepScore+goalsScore+actScore+screenScore;
    const grade=total>=90?"S":total>=75?"A":total>=60?"B":total>=40?"C":"D";
    const gc={S:C.cyan,A:C.grn,B:C.pri,C:C.amb,D:C.red}[grade];
    return{sleepScore,goalsScore,actScore,screenScore,total,grade,gc,log,pom,sh,done,allGoals:all.length,date};
  },[userId]);

  const generate=()=>{
    setGenerating(true);
    setTimeout(()=>{
      const r=calcReport(today());
      // Save to history
      const hist=db.get(`report_history:${userId}`)||{};
      hist[today()]=r.total;
      db.set(`report_history:${userId}`,hist);
      setReport(r);setGenerating(false);
    },800);
  };

  // Tip generation
  const getTip=r=>{
    const scores=[
      {cat:"Sono",score:r.sleepScore,tip:"Tente ir dormir 30min mais cedo. Sono é a base de tudo para o TDAH — sem ele, o foco é impossível."},
      {cat:"Metas",score:r.goalsScore,tip:"Divida suas metas em mini-tarefas de 5 minutos. O TDAH precisa de recompensas rápidas para manter o engajamento."},
      {cat:"Atividade",score:r.actScore,tip:"15 minutos de caminhada já aumentam o BDNF — proteína que melhora conexões neuronais. Começa pequeno!"},
      {cat:"Tempo de tela",score:r.screenScore,tip:"Cada hora extra de tela antes de dormir piora o sono em 30min. Experimente um alarme '1h antes de dormir — sem tela'."},
    ];
    const worst=scores.sort((a,b)=>a.score-b.score)[0];
    return worst;
  };

  // History data
  const historyData=useMemo(()=>{
    const hist=db.get(`report_history:${userId}`)||{};
    return getLast30().map(d=>({date:d,score:hist[d]||null})).filter(x=>x.score!==null);
  },[userId]);

  // Last 14 days sleep for chart
  const sleepChart=useMemo(()=>{
    return getLast14().map(d=>{
      const l=db.get(`logs:${userId}:${d}`)||{};
      const h=l.sleep?({4:4,5:5,6:6,7:7,8:8,9:9,10:10,"11h+":11}[l.sleep]||null):null;
      const day=new Date(d+"T12:00:00");
      return{date:d,h,label:day.toLocaleDateString("pt-BR",{day:"numeric",month:"numeric"}).replace("/",".")};
    });
  },[userId]);

  // Indicators (averages)
  const indicators=useMemo(()=>{
    const days30=getLast30();
    let sleepArr=[],focusArr=[],screenArr=[],medDays=0,actDays=0,waterArr=[],loggedDays=0;
    for(const d of days30){
      const l=db.get(`logs:${userId}:${d}`);
      if(!l)continue;loggedDays++;
      if(l.sleep){const h={4:4,5:5,6:6,7:7,8:8,9:9,10:10,"11h+":11}[l.sleep]||0;sleepArr.push(h);}
      if(l.medTook)medDays++;
      if(l.activity&&l.activity!=="descanso")actDays++;
      if(l.water)waterArr.push(l.water);
      const p=db.get(`pomodoro:${userId}`);if(p?.totalMin)focusArr.push(p.totalMin/30);
    }
    const avg=arr=>arr.length>0?Math.round((arr.reduce((a,b)=>a+b,0)/arr.length)*10)/10:0;
    const sleepAvg=avg(sleepArr);
    const waterAvg=avg(waterArr);
    const focusAvg=avg(focusArr);
    const scPct=loggedDays>0?Math.round((medDays/loggedDays)*100):0;
    const actPct=loggedDays>0?actDays:0;
    const sleepStatus=sleepAvg>=7?"Adequado":sleepAvg>=6?"Atenção":"Crítico";
    const sleepColor=sleepAvg>=7?C.grn:sleepAvg>=6?C.amb:C.red;
    const waterStatus=waterAvg>=6?"Adequado":waterAvg>=4?"Atenção":"Baixo";
    const waterColor=waterAvg>=6?C.grn:waterAvg>=4?C.amb:C.red;
    return{sleepAvg,waterAvg,focusAvg,medDays,actDays,scPct,loggedDays,sleepStatus,sleepColor,waterStatus,waterColor};
  },[userId]);

  if(view==="history")return(
    <div style={{padding:"0 16px 100px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,paddingTop:4}}>
        <button onClick={()=>setView("today")} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:26}}>←</button>
        <div style={{fontWeight:700,fontSize:18}}>Histórico de pontuações</div>
      </div>
      {historyData.length===0?(
        <div style={{textAlign:"center",padding:"40px 0",color:C.mut}}>
          <div style={{fontSize:44,marginBottom:14}}>📅</div>
          <div style={{color:C.txt,fontWeight:700,marginBottom:6}}>Nenhum histórico ainda</div>
          <div style={{fontSize:13}}>Gere seu primeiro relatório!</div>
        </div>
      ):(
        <>
          <Card style={{marginBottom:14}}>
            <Lbl>📈 Evolução — últimos {historyData.length} dias</Lbl>
            <svg width="100%" height="120" viewBox={`0 0 ${historyData.length*28} 100`} preserveAspectRatio="none">
              {historyData.map((d,i)=>{
                const x=i*28+14;const h=d.score;const y=90-(h*0.8);
                const col=h>=75?C.grn:h>=50?C.amb:C.red;
                return(
                  <g key={d.date}>
                    <rect x={x-8} y={y} width={16} height={90-y} fill={col} opacity={0.7} rx={3}/>
                    <text x={x} y={98} textAnchor="middle" fontSize="7" fill={C.mut} fontFamily="system-ui">{d.date.slice(8)}</text>
                  </g>
                );
              })}
            </svg>
          </Card>
          {[...historyData].reverse().map(d=>{
            const col=d.score>=75?C.grn:d.score>=50?C.amb:C.red;
            const grade=d.score>=90?"S":d.score>=75?"A":d.score>=60?"B":d.score>=40?"C":"D";
            return(
              <div key={d.date} style={{background:C.card,border:`1px solid ${C.bord}`,borderRadius:14,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>{setHistReport(calcReport(d.date));setView("detail");}}>
                <div>
                  <div style={{color:C.txt,fontWeight:700,fontSize:15}}>{new Date(d.date+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short"})}</div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{color:col,fontWeight:800,fontSize:20}}>{d.score}/100</div>
                  <div style={{background:col+"25",border:`1px solid ${col}50`,borderRadius:8,padding:"4px 10px",color:col,fontWeight:800,fontSize:14}}>Nota {grade}</div>
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );

  if(view==="detail"&&histReport){
    const r=histReport;const tip=getTip(r);
    return(
      <div style={{padding:"0 16px 100px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingTop:4}}>
          <button onClick={()=>setView("history")} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:26}}>←</button>
          <div style={{fontWeight:700,fontSize:16}}>{new Date(r.date+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
        <ReportContent r={r} tip={tip}/>
      </div>
    );
  }

  return(
    <div style={{padding:"0 0 100px"}}>
      {/* Top Stats */}
      <div style={{background:`linear-gradient(160deg,${C.pri}30,${C.cyan}15)`,borderBottom:`1px solid ${C.bord}`,padding:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontWeight:800,fontSize:16}}>Relatório CleanTDAH</div>
            <div style={{color:C.mut,fontSize:12,marginTop:2}}>Últimos 30 dias</div>
          </div>
          <button onClick={()=>setView("history")} style={{background:C.pri+"25",border:`1px solid ${C.pri}`,borderRadius:10,color:C.pri,padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>📅 Histórico</button>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{v:report?.total||"—",l:"Score geral /100",c:report?report.gc:C.mut},{v:indicators.loggedDays,l:"Dias registrados",c:C.cyan},{v:indicators.scPct+"%",l:"Uso do remédio",c:C.pnk}].map(({v,l,c})=>(
            <div key={l} style={{flex:1,background:C.card,borderRadius:14,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.bord}`}}>
              <div style={{color:c,fontWeight:800,fontSize:20}}>{v}</div>
              <div style={{color:C.mut,fontSize:10,marginTop:2,lineHeight:1.3}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* Indicadores */}
        <Card style={{marginBottom:14}}>
          <Lbl color={C.cyan}>📊 Indicadores do período</Lbl>
          {[
            {l:"Média de sono/noite",v:`${indicators.sleepAvg}h`,status:indicators.sleepStatus,sc:indicators.sleepColor},
            {l:"Taxa de conclusão de metas",v:"—",status:"Ver metas",sc:C.mut},
            {l:"Média de foco diário",v:`${indicators.focusAvg}min/dia`,status:indicators.focusAvg>=60?"Adequado":indicators.focusAvg>=30?"Atenção":"Baixo",sc:indicators.focusAvg>=60?C.grn:indicators.focusAvg>=30?C.amb:C.red},
            {l:"Registro de medicação",v:`${indicators.medDays} em ${indicators.loggedDays} dias`,status:null,sc:null},
            {l:"Atividade física",v:`${indicators.actDays} em ${indicators.loggedDays} dias`,status:null,sc:null},
            {l:"Média de água/dia",v:`${(indicators.waterAvg*0.25).toFixed(1)}L`,status:indicators.waterStatus,sc:indicators.waterColor},
          ].map(({l,v,status,sc})=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,marginBottom:10,borderBottom:`1px solid ${C.bord}`}}>
              <div style={{color:C.txt,fontSize:14,flex:1}}>{l}</div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                <span style={{fontWeight:700,fontSize:14,color:sc||C.cyan}}>{v}</span>
                {status&&<Tag color={sc||C.grn}>{status}</Tag>}
              </div>
            </div>
          ))}
        </Card>

        {/* Evolução do sono */}
        <Card style={{marginBottom:14}}>
          <Lbl color={C.pri}>🛏️ Evolução do sono — últimas 2 semanas</Lbl>
          <div style={{overflowX:"auto"}}>
            <svg width={Math.max(300,sleepChart.length*28+40)} height="110" viewBox={`0 0 ${Math.max(300,sleepChart.length*28+40)} 110`}>
              {sleepChart.map((d,i)=>{
                const x=i*28+20;const h=d.h||0;
                const barH=h>0?Math.min(70,Math.round((h/11)*70)):0;
                const col=h>=7?C.grn:h>=6?C.amb:h>0?C.red:C.bord;
                return(
                  <g key={d.date}>
                    {h>0&&<rect x={x-8} y={90-barH} width={16} height={barH} fill={col} opacity={0.8} rx={3}/>}
                    {h===0&&<rect x={x-8} y={85} width={16} height={5} fill={C.bord} rx={2}/>}
                    <text x={x} y={104} textAnchor="middle" fontSize="8" fill={C.mut} fontFamily="system-ui">{d.label}</text>
                    {h>0&&<text x={x} y={88-barH} textAnchor="middle" fontSize="8" fill={col} fontFamily="system-ui" fontWeight="700">{h}h</text>}
                  </g>
                );
              })}
            </svg>
          </div>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            {[{c:C.grn,l:"≥7h adequado"},{c:C.amb,l:"6-7h atenção"},{c:C.red,l:"<6h crítico"}].map(({c,l})=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.mut}}>
                <div style={{width:10,height:10,borderRadius:3,background:c}}/>
                {l}
              </div>
            ))}
          </div>
        </Card>

        {/* Gerar relatório do dia */}
        {!report?(
          <button onClick={generate} disabled={generating} style={{
            width:"100%",background:`linear-gradient(135deg,${C.pri},${C.pnk})`,
            border:"none",borderRadius:16,color:"#fff",padding:"16px",
            cursor:generating?"wait":"pointer",fontWeight:800,fontSize:16,
            boxShadow:glow(C.pri,12),marginBottom:14,
          }}>{generating?"Calculando... 🧠":"Gerar Relatório de Hoje ✨"}</button>
        ):(
          <ReportContent r={report} tip={getTip(report)}/>
        )}
      </div>
    </div>
  );
}

function ReportContent({r,tip}){
  return(
    <div className="fadein">
      {/* Score hero */}
      <div style={{textAlign:"center",padding:"24px 16px",background:`linear-gradient(160deg,${C.card},${C.surf})`,borderRadius:20,border:`1px solid ${r.gc}50`,marginBottom:14,boxShadow:glow(r.gc,25)}}>
        <div style={{fontSize:11,color:C.mut,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{r.date}</div>
        <div style={{fontSize:84,fontWeight:800,color:r.gc,lineHeight:1,filter:`drop-shadow(0 0 20px ${r.gc}70)`}}>{r.total}</div>
        <div style={{fontSize:15,color:C.mut,marginBottom:14}}>pontos de 100</div>
        <div style={{display:"inline-flex",gap:10,alignItems:"center",background:r.gc+"20",border:`1px solid ${r.gc}50`,borderRadius:14,padding:"8px 20px"}}>
          <span style={{fontSize:22,fontWeight:800,color:r.gc}}>Nota {r.grade}</span>
          <span style={{fontSize:20}}>{{S:"🌟",A:"🎉",B:"👍",C:"💪",D:"🔄"}[r.grade]}</span>
        </div>
      </div>

      {/* Breakdown */}
      <Card style={{marginBottom:14}}>
        <Lbl>📈 Detalhamento</Lbl>
        {[
          {l:"Sono",s:r.sleepScore,max:25,c:C.pri,i:"🌙",d:r.sh>0?`${r.sh}h dormidas`:"Não registrado"},
          {l:"Metas",s:r.goalsScore,max:25,c:C.cyan,i:"🎯",d:`${r.done}/${r.allGoals} concluídas`},
          {l:"Atividade",s:r.actScore,max:25,c:C.grn,i:"🏃",d:r.actScore===25?`${SPORTS.find(x=>x.id===r.log.activity)?.label||"Feita"} ✓`:"Não feita"},
          {l:"Tempo de tela",s:r.screenScore,max:25,c:C.amb,i:"📱",d:r.log.screen||"Não registrado"},
        ].map(bar=>(
          <div key={bar.l} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:6}}>
              <div><span style={{color:C.txt,fontSize:14,fontWeight:700}}>{bar.i} {bar.l}</span><div style={{fontSize:11,color:C.mut,marginTop:1}}>{bar.d}</div></div>
              <span style={{color:bar.c,fontWeight:800,fontSize:16}}>{bar.s}/{bar.max}</span>
            </div>
            <div style={{background:C.bord,borderRadius:99,height:10,overflow:"hidden"}}>
              <div style={{width:`${(bar.s/bar.max)*100}%`,height:"100%",background:bar.c,borderRadius:99,boxShadow:`0 0 8px ${bar.c}50`,transition:"width 1.2s ease"}}/>
            </div>
          </div>
        ))}
      </Card>

      {/* Destaques */}
      <Card style={{marginBottom:14}}>
        <Lbl>🏅 Destaques</Lbl>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {r.pom.cycles>0&&<Tag color={C.cyan}>⚡ {r.pom.cycles} ciclos</Tag>}
          {r.pom.totalMin>0&&<Tag color={C.pri}>🧠 {r.pom.totalMin}min focado</Tag>}
          {r.log.water>0&&<Tag color={C.cyan}>💧 {r.log.water} copos</Tag>}
          {r.log.activity&&r.log.activity!=="descanso"&&<Tag color={C.grn}>🏃 {SPORTS.find(x=>x.id===r.log.activity)?.label}</Tag>}
          {r.log.mood&&<Tag color={C.pnk}>😊 Humor {r.log.mood}/5</Tag>}
          {r.log.medTook&&<Tag color={C.pnk}>💊 Remédio tomado</Tag>}
          {(!r.pom.cycles&&!r.log.water&&!r.log.activity&&!r.log.mood)&&<span style={{color:C.mut,fontSize:13}}>Registre atividades na aba Hoje!</span>}
        </div>
      </Card>

      {/* Dica personalizada */}
      {tip&&(
        <div style={{background:`linear-gradient(135deg,${C.amb}15,${C.pri}10)`,border:`1px solid ${C.amb}40`,borderRadius:16,padding:18,marginBottom:14}}>
          <div style={{color:C.amb,fontWeight:800,fontSize:15,marginBottom:8}}>💡 Dica para amanhã — Foco em: {tip.cat}</div>
          <div style={{color:C.txt,fontSize:14,lineHeight:1.7}}>{tip.tip}</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
const TABS=[{id:"home",l:"Hoje",i:"🏠"},{id:"pomodoro",l:"Foco",i:"⚡"},{id:"community",l:"Comunidade",i:"🌐"},{id:"goals",l:"Metas",i:"🎯"},{id:"report",l:"Relatório",i:"📊"}];

function MainApp({user,onLogout}){
  const[tab,setTab]=useState("home");
  const[toasts,setToasts]=useState([]);
  const contRef=useRef(null);

  useEffect(()=>{if(contRef.current)contRef.current.scrollTop=0;},[tab]);

  const addToast=useCallback((title,msg,badge=false)=>{
    const id=uid();
    setToasts(t=>[...t.slice(-2),{id,title,msg,badge}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);

  const onXP=useCallback((amt,msg)=>{
    const xd=db.get(`xp:${user.id}`)||{xp:0,badges:[]};
    const prevLvl=getLvl(xd.xp).lvl;
    const nxp=xd.xp+amt;
    const newLvl=getLvl(nxp).lvl;
    db.set(`xp:${user.id}`,{...xd,xp:nxp});
    addToast("⚡ XP Ganho!",msg);
    if(newLvl>prevLvl){
      const lv=getLvl(nxp);
      setTimeout(()=>addToast(`🎉 Nível ${lv.lvl} — ${lv.name}!`,lv.msg,true),500);
    }
  },[user.id,addToast]);

  const onBadge=useCallback((id,name,desc)=>{
    const xd=db.get(`xp:${user.id}`)||{xp:0,badges:[]};
    if(xd.badges?.includes(id))return;
    const nb={...xd,badges:[...(xd.badges||[]),id]};
    db.set(`xp:${user.id}`,nb);
    addToast(`🏅 Badge: ${name}!`,desc,true);
    onXP(50,`🏅 +50 XP pelo badge ${name}!`);
  },[user.id,addToast,onXP]);

  return(
    <div style={{height:"100vh",background:C.bg,display:"flex",flexDirection:"column",maxWidth:600,margin:"0 auto",position:"relative"}}>
      <ToastContainer toasts={toasts}/>
      <div style={{padding:"12px 18px 10px",background:C.surf,borderBottom:`1px solid ${C.bord}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🧠</span>
          <div>
            <div style={{fontWeight:800,fontSize:16,background:`linear-gradient(135deg,${C.pri},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CleanTDAH</div>
            <div style={{fontSize:11,color:C.mut}}>@{user.uname}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{background:"transparent",border:`1px solid ${C.bord}`,borderRadius:8,color:C.mut,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Sair</button>
      </div>

      <div ref={contRef} style={{flex:1,overflowY:"auto",paddingTop:4}}>
        {tab==="home"&&<HomeTab userId={user.id} username={user.uname} onXP={onXP} onBadge={onBadge}/>}
        {tab==="pomodoro"&&<PomodoroTab userId={user.id} onXP={onXP} onBadge={onBadge}/>}
        {tab==="community"&&<CommunityTab userId={user.id} username={user.uname}/>}
        {tab==="goals"&&<GoalsTab userId={user.id} onXP={onXP} onBadge={onBadge}/>}
        {tab==="report"&&<ReportTab userId={user.id}/>}
      </div>

      <div style={{background:C.surf,borderTop:`1px solid ${C.bord}`,display:"flex",padding:"8px 4px 14px",flexShrink:0,zIndex:10}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 2px"}}>
            <div style={{fontSize:21,filter:tab===t.id?`drop-shadow(0 0 6px ${C.cyan})`:"none",transition:"filter 0.2s"}}>{t.i}</div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase",color:tab===t.id?C.cyan:C.mut,transition:"color 0.2s"}}>{t.l}</div>
            {tab===t.id&&<div style={{width:20,height:2.5,background:C.cyan,borderRadius:99,boxShadow:`0 0 8px ${C.cyan}`}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   ROOT
═══════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{const s=db.get("session");if(s?.uname){const u=db.get(`users:${s.uname}`);if(u)setUser(u);}setLoading(false);},[]);
  const logout=()=>{db.del("session");setUser(null);};
  if(loading)return(
    <div style={{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:52,marginBottom:12}}>🧠</div><div style={{color:C.mut,fontSize:15}}>Carregando...</div></div>
    </div>
  );
  return user?<MainApp user={user} onLogout={logout}/>:<AuthScreen onLogin={setUser}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
