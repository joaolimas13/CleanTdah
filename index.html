<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>CleanTDAH — Foco sem fricção</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06080F;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#E8EDF8;overscroll-behavior:none;}
input,textarea,button,select{font-family:inherit;}
input[type=range]{accent-color:#00D4FF;height:6px;width:100%;}
input[type=time]{background:#0B0F1E;border:1px solid #1A2440;border-radius:8px;color:#E8EDF8;padding:8px 12px;font-size:15px;outline:none;width:100%;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1A2440;border-radius:99px;}
button:active{transform:scale(0.96);}textarea{resize:vertical;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(110%)}}
@keyframes badgePop{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes somaPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.08)}}
@keyframes neuronPulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes dendPulse{from{opacity:0.4}to{opacity:0.9}}
@keyframes xpBar{from{width:0}to{width:var(--xp-pct)}}
.fadein{animation:fadeIn 0.4s ease forwards;}
.slideup{animation:slideUp 0.3s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

/* ───── TEMA ───── */
const C={bg:"#06080F",surf:"#0B0F1E",card:"#10162A",bord:"#1A2440",
  pri:"#7C5CF6",cyan:"#00D4FF",grn:"#00E896",amb:"#FFB020",
  pnk:"#FF5294",red:"#FF3B5C",txt:"#E8EDF8",mut:"#4E5F80"};
const glow=(c,p=20)=>`0 0 ${p}px ${c}40,0 0 ${p*2}px ${c}18`;

/* ───── STORAGE ───── */
const db={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:k=>{try{localStorage.removeItem(k);}catch{}}
};
const hash=s=>[...s].reduce((a,c)=>(a<<5)-a+c.charCodeAt(0)|0,0).toString(36);
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const getLast14=()=>{const d=[];for(let i=13;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().slice(0,10));}return d;};
const getLast30=()=>{const d=[];for(let i=29;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().slice(0,10));}return d;};

/* ───── XP / LEVELS ───── */
const LEVELS=[
  {lvl:1,min:0,name:"Iniciante",icon:"🌱",msg:"Bem-vindo! Cada dia conta!"},
  {lvl:2,min:100,name:"Aprendiz",icon:"📚",msg:"Você está evoluindo! Continue!"},
  {lvl:3,min:250,name:"Focado",icon:"⚡",msg:"Seu foco está crescendo!"},
  {lvl:4,min:500,name:"Determinado",icon:"💪",msg:"Determinação de guerreiro!"},
  {lvl:5,min:1000,name:"Persistente",icon:"🔥",msg:"A persistência te define!"},
  {lvl:6,min:2000,name:"Dedicado",icon:"🚀",msg:"Dedicação máxima ativada!"},
  {lvl:7,min:3500,name:"Ninja do Foco",icon:"🥷",msg:"Imbatível! Ninja total!"},
  {lvl:8,min:5000,name:"Mestre",icon:"🧠",msg:"Mestre da sua própria mente!"},
  {lvl:9,min:7500,name:"Lendário",icon:"⭐",msg:"Você inspira a todos!"},
  {lvl:10,min:10000,name:"TDAH Supremo",icon:"👑",msg:"Você conquistou tudo! Lenda!"},
];
const getLvl=xp=>{let l=LEVELS[0];for(const x of LEVELS){if(xp>=x.min)l=x;else break;}const n=LEVELS.find(x=>x.min>xp);return{...l,next:n?.min||xp,pct:n?Math.min(100,((xp-l.min)/(n.min-l.min))*100):100};};

/* ───── BADGES ───── */
const ALL_BADGES=[
  {id:"first_log",icon:"🌱",name:"Primeiro Passo",desc:"Primeiro registro feito"},
  {id:"hydrated",icon:"💧",name:"Hidratado",desc:"8+ copos em um dia"},
  {id:"focused_day",icon:"⚡",name:"Dia Focado",desc:"4+ ciclos Pomodoro em um dia"},
  {id:"consistent_7",icon:"📅",name:"7 Dias",desc:"7 dias de registro seguidos"},
  {id:"sleep_master",icon:"🌙",name:"Mestre do Sono",desc:"7h+ por 5 dias"},
  {id:"med_streak",icon:"💊",name:"Remédio em Dia",desc:"Medicação 7 dias seguidos"},
  {id:"goal_ninja",icon:"🎯",name:"Meta Ninja",desc:"Todas as metas concluídas"},
  {id:"pomodoro_10",icon:"🍅",name:"Tomate de Ouro",desc:"10 ciclos Pomodoro total"},
  {id:"athlete_3",icon:"🏃",name:"Atleta",desc:"Exercício 3 dias seguidos"},
  {id:"water_week",icon:"🌊",name:"Oceano",desc:"8+ copos por 7 dias seguidos"},
];

/* ───── MEDICAMENTOS ───── */
const MEDS={
  venvanse:{name:"Venvanse",duration:720,peak:[120,240],color:C.cyan},
  ritalina:{name:"Ritalina LA",duration:480,peak:[60,150],color:C.grn},
  concerta:{name:"Concerta",duration:660,peak:[180,300],color:C.amb},
  atentah:{name:"Atentah",duration:270,peak:[60,120],color:C.pnk},
  adderall:{name:"Adderall",duration:360,peak:[90,180],color:C.pri},
  outro:{name:"Outro",duration:0,peak:[0,0],color:C.mut},
};
const medPhase=(med,min)=>{
  if(!med||med.name==="Outro")return null;
  const[ps,pe]=med.peak;
  if(min<0)return{label:"⏳ Aguardando efeito",sub:"Você tomou agora, aguarde...",color:C.mut};
  if(min<30)return{label:"⚡ Absorção inicial",sub:"Início da ação no organismo",color:C.amb};
  if(min<ps)return{label:"📈 Subindo ao pico",sub:"Dopamina e norepinefrina aumentando",color:C.amb};
  if(min<=pe)return{label:"🔥 Pico de concentração",sub:"Máxima efetividade cognitiva agora!",color:C.grn};
  if(min<med.duration*0.75)return{label:"✅ Efeito estável",sub:"Ação sustentada no SNC",color:C.cyan};
  if(min<med.duration)return{label:"🌅 Início do metabolismo",sub:"Efeito diminuindo gradualmente",color:C.amb};
  return{label:"⏰ Efeito encerrado",sub:"Hora de avaliar nova dose",color:C.red};
};

/* ───── ESPORTES ───── */
const SPORTS=[
  {id:"caminhada",label:"Caminhada",icon:"🚶"},
  {id:"musculacao",label:"Musculação",icon:"🏋️"},
  {id:"corrida",label:"Corrida",icon:"🏃"},
  {id:"ciclismo",label:"Ciclismo",icon:"🚴"},
  {id:"outro",label:"Outro",icon:"⚽"},
  {id:"descanso",label:"Descanso",icon:"😴"},
];

/* ───── FÓRUM ───── */
const CATS=[
  {id:"foco",label:"Foco",color:C.cyan},
  {id:"meds",label:"Medicação",color:C.pnk},
  {id:"dicas",label:"Dicas",color:C.grn},
  {id:"desabafo",label:"Desabafo",color:C.amb},
  {id:"conquistas",label:"Conquistas",color:C.pri},
];

/* ═══════════════════════════════════════
   COMPONENTES BASE
═══════════════════════════════════════ */
const Btn=({children,onClick,color=C.pri,outline=false,small=false,style:sx={},disabled=false})=>(
  <button onClick={onClick} disabled={disabled} style={{
    background:outline?"transparent":disabled?"#1A2440":color,
    border:`1.5px solid ${disabled?"#2a3450":color}`,borderRadius:12,
    color:outline?color:"#fff",padding:small?"8px 16px":"13px 22px",
    cursor:disabled?"not-allowed":"pointer",fontWeight:700,
    fontSize:small?13:15,opacity:disabled?0.55:1,transition:"all 0.18s",...sx
  }}>{children}</button>
);
const Card=({children,style:sx={},gw=null})=>(
  <div style={{background:C.card,border:`1px solid ${C.bord}`,borderRadius:18,padding:18,boxShadow:gw?glow(gw):"none",...sx}}>
    {children}
  </div>
);
const Lbl=({children,color=C.mut})=>(
  <div style={{fontSize:12,color,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontWeight:600}}>{children}</div>
);
const Tag=({children,color=C.grn})=>(
  <span style={{background:color+"25",border:`1px solid ${color}50`,borderRadius:20,color,fontSize:11,fontWeight:700,padding:"3px 10px",whiteSpace:"nowrap"}}>{children}</span>
);

/* ═══════════════════════════════════════
   TOAST SYSTEM
═══════════════════════════════════════ */
function ToastContainer({toasts}){
  return(
    <div style={{position:"fixed",top:76,right:12,zIndex:9999,display:"flex",flexDirection:"column",gap:8,maxWidth:260}}>
      {toasts.map(t=>(
        <div key={t.id} style={{
          background:t.badge?C.amb+"f0":C.pri+"f0",
          border:`1px solid ${t.badge?C.amb:C.pri}80`,
          borderRadius:14,padding:"10px 14px",
          animation:`toastIn 0.3s ease`,backdropFilter:"blur(8px)"
        }}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{t.title}</div>
          <div style={{fontSize:12,color:"#ffffffbb",marginTop:2}}>{t.msg}</div>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   NEURÔNIO SVG
═══════════════════════════════════════ */
function NeuronSVG({level=0,pulse=false}){
  const lv=Math.min(level,6);
  const cols=[C.mut,C.pri,C.cyan,C.grn,C.amb,C.pnk,C.cyan];
  const col=cols[lv];const sz=70+lv*12;
  const dd=[[],[[-30,-40],[30,-40]],[[-45,-25],[45,-25],[0,-55]],[[-50,-30],[50,-30],[-30,-50],[30,-50],[0,-60]],[[-55,-20],[55,-20],[-45,-42],[45,-42],[-15,-58],[15,-58]],[[-58,-15],[58,-15],[-50,-38],[50,-38],[-25,-55],[25,-55],[0,-62]],[[-60,-10],[60,-10],[-52,-35],[52,-35],[-30,-52],[30,-52],[-10,-62],[10,-62]]][lv];
  const cx=100,cy=130;
  return(
    <svg width="200" height="190" viewBox="0 0 200 190" style={{overflow:"visible"}}>
      <defs><radialGradient id="ng"><stop offset="0%" stopColor={col} stopOpacity="0.35"/><stop offset="100%" stopColor={col} stopOpacity="0"/></radialGradient></defs>
      {lv>=2&&<circle cx={cx} cy={cy} r={sz*0.85} fill="url(#ng)" style={{animation:pulse?"neuronPulse 2s ease-in-out infinite":"none"}}/>}
      <line x1={cx} y1={cy+18} x2={cx} y2={cy+55} stroke={col} strokeWidth={2} strokeOpacity={0.7}/>
      {lv>=1&&<><line x1={cx} y1={cy+55} x2={cx-20} y2={cy+75} stroke={col} strokeWidth={1.5} strokeOpacity={0.6}/><line x1={cx} y1={cy+55} x2={cx+20} y2={cy+75} stroke={col} strokeWidth={1.5} strokeOpacity={0.6}/><circle cx={cx-20} cy={cy+78} r={3} fill={col} opacity={0.9}/><circle cx={cx+20} cy={cy+78} r={3} fill={col} opacity={0.9}/></>}
      {lv>=3&&<><line x1={cx-20} y1={cy+78} x2={cx-35} y2={cy+95} stroke={col} strokeWidth={1.2} strokeOpacity={0.5}/><line x1={cx+20} y1={cy+78} x2={cx+35} y2={cy+95} stroke={col} strokeWidth={1.2} strokeOpacity={0.5}/><circle cx={cx-35} cy={cy+98} r={2.5} fill={col} opacity={0.8}/><circle cx={cx+35} cy={cy+98} r={2.5} fill={col} opacity={0.8}/></>}
      {dd.map(([dx,dy],i)=>(
        <g key={i}><line x1={cx} y1={cy} x2={cx+dx} y2={cy+dy} stroke={col} strokeWidth={1.5} strokeOpacity={0.65} style={{animation:pulse?`dendPulse ${1.5+i*0.2}s ease-in-out infinite alternate`:"none"}}/><circle cx={cx+dx} cy={cy+dy} r={lv>=4?3.5:2.5} fill={col} opacity={0.9}/></g>
      ))}
      {lv>=4&&<g opacity={0.7}><circle cx={cx+75} cy={cy-20} r={lv>=5?13:10} fill={C.pri} fillOpacity={0.15} stroke={C.pri} strokeWidth={1.5}/><line x1={cx+62} y1={cy-22} x2={cx+18} y2={cy-5} stroke={col} strokeWidth={1.5} strokeOpacity={0.5} strokeDasharray="4 3"/><circle cx={cx+62} cy={cy-22} r={2.5} fill={col} opacity={0.8}/></g>}
      <circle cx={cx} cy={cy} r={sz*0.18} fill={col} fillOpacity={0.12} stroke={col} strokeWidth={2} style={{animation:pulse?"somaPulse 1.5s ease-in-out infinite":"none"}}/>
      <circle cx={cx} cy={cy} r={sz*0.10} fill={col} fillOpacity={0.35}/><circle cx={cx} cy={cy} r={sz*0.05} fill={col}/>
      {lv>=2&&<circle cx={cx} cy={cy} r={sz*0.06} fill="white" fillOpacity={0.6}/>}
    </svg>
  );
}

/* ═══════════════════════════════════════
   RESPIRAÇÃO QUADRADA
═══════════════════════════════════════ */
const BPHASES=[
  {name:"Inspirar",dur:4,grow:true,color:C.cyan,hint:"Inspire lentamente pelo nariz"},
  {name:"Segurar",dur:4,grow:false,color:C.grn,hint:"Segure o ar, mantenha calmo"},
  {name:"Expirar",dur:4,grow:false,color:C.pnk,hint:"Solte lentamente pela boca"},
  {name:"Segurar",dur:4,grow:false,color:C.mut,hint:"Pulmões vazios, descanse"},
];

function BreathingExercise({onComplete}){
  const[active,setActive]=useState(false);
  const[pi,setPi]=useState(0);
  const[secs,setSecs]=useState(4);
  const[cycles,setCycles]=useState(0);
  const[big,setBig]=useState(false);
  const ref=useRef(null);
  const ph=BPHASES[pi];

  useEffect(()=>{
    if(!active){clearInterval(ref.current);setBig(false);setPi(0);setSecs(4);return;}
    setBig(pi===0||pi===1);
    ref.current=setInterval(()=>{
      setSecs(s=>{
        if(s<=1){
          const ni=(pi+1)%4;
          setPi(ni);setBig(ni===0||ni===1);
          if(ni===0)setCycles(c=>{const nc=c+1;if(nc>=4&&onComplete)onComplete();return nc;});
          setSecs(BPHASES[ni].dur);return BPHASES[ni].dur;
        }return s-1;
      });
    },1000);
    return()=>clearInterval(ref.current);
  },[active,pi]);

  return(
    <div style={{textAlign:"center",padding:"8px 0"}}>
      <div style={{position:"relative",width:150,height:150,margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",width:130,height:130,borderRadius:"50%",border:`1.5px solid ${ph.color}25`}}/>
        <div style={{
          width:110,height:110,borderRadius:"50%",
          background:`radial-gradient(circle,${ph.color}35,${ph.color}10)`,
          border:`2px solid ${ph.color}70`,
          transform:active?(big?"scale(1)":"scale(0.42)"):"scale(0.42)",
          transition:active?`transform ${ph.dur}s ease-in-out`:"none",
          display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",
          boxShadow:active?glow(ph.color,12):"none",
        }}>
          <div style={{fontSize:26,fontWeight:800,color:ph.color,lineHeight:1}}>{secs}</div>
          <div style={{fontSize:9,color:ph.color+"bb",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>seg</div>
        </div>
      </div>
      <div style={{color:ph.color,fontWeight:700,fontSize:17,marginBottom:4}}>{active?ph.name:"Respiração 4-4-4-4"}</div>
      <div style={{color:C.mut,fontSize:12,marginBottom:4}}>{active?ph.hint:"Inspire · Segure · Expire · Segure"}</div>
      {active&&<div style={{color:C.cyan,fontSize:12,marginBottom:12}}>Ciclo {cycles}/4</div>}
      {cycles>=4&&<div style={{color:C.grn,fontSize:13,fontWeight:700,marginBottom:10}}>✓ 4 ciclos! Perfeito! 🧘</div>}
      <button onClick={()=>{setActive(!active);if(active)setCycles(0);}} style={{
        background:active?C.red+"20":C.cyan+"20",border:`1px solid ${active?C.red:C.cyan}`,
        borderRadius:12,color:active?C.red:C.cyan,padding:"9px 22px",cursor:"pointer",fontWeight:700,fontSize:13
      }}>{active?"Parar":"Iniciar"}</button>
    </div>
  );
}

/* ═══════════════════════════════════════
   REATIVAR FOCO
═══════════════════════════════════════ */
const QUOTES=[
  "Seu cérebro TDAH é uma Ferrari com freios de bicicleta. Você só precisa aprender a pilotar! 🏎️",
  "Cada ciclo de foco que você completa é uma vitória real. Celebre! 🏆",
  "Não existe perfeição, existe progresso. E você está progredindo! ⚡",
  "O TDAH não te define. Sua determinação sim. 💪",
  "Um passo de cada vez. Agora mesmo, só este momento importa. 🧠",
  "Dificuldade de foco não é fraqueza, é o seu combustível diferente. Use-o! 🚀",
];

function ReativarFoco({onXP}){
  const[open,setOpen]=useState(false);
  const[exc,setExc]=useState({type:"flexao",count:0,done:false});
  const[shower,setShower]=useState({timer:0,running:false,done:false});
  const[walk,setWalk]=useState({timer:0,running:false,done:false});
  const[breathDone,setBreathDone]=useState(false);
  const[quoteDone,setQuoteDone]=useState(false);
  const[sunDone,setSunDone]=useState(false);
  const shRef=useRef(null),wkRef=useRef(null);
  const[quote]=useState(QUOTES[Math.floor(Math.random()*QUOTES.length)]);

  const startShower=()=>{
    setShower(s=>({...s,timer:30,running:true}));
    shRef.current=setInterval(()=>{
      setShower(s=>{
        if(s.timer<=1){clearInterval(shRef.current);onXP(15,"🚿 +15 XP banho gelado!");return{...s,timer:0,running:false,done:true};}
        return{...s,timer:s.timer-1};
      });
    },1000);
  };
  const startWalk=()=>{
    setWalk(s=>({...s,timer:120,running:true}));
    wkRef.current=setInterval(()=>{
      setWalk(s=>{
        if(s.timer<=1){clearInterval(wkRef.current);onXP(10,"🚶 +10 XP caminhada!");return{...s,timer:0,running:false,done:true};}
        return{...s,timer:s.timer-1};
      });
    },1000);
  };

  const done=[exc.done,shower.done,breathDone,walk.done,quoteDone,sunDone].filter(Boolean).length;

  return(
    <div style={{marginTop:12}}>
      <button onClick={()=>setOpen(!open)} style={{
        width:"100%",background:open?C.pnk+"18":`linear-gradient(135deg,${C.pnk}15,${C.pri}15)`,
        border:`1px solid ${C.pnk}45`,borderRadius:14,color:C.txt,
        padding:"13px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
      }}>
        <div style={{textAlign:"left"}}>
          <div style={{fontWeight:700,fontSize:15,color:C.pnk}}>🔄 Reativar Foco</div>
          <div style={{fontSize:12,color:C.mut,marginTop:2}}>{done}/6 atividades • 5 passos para voltar ao estado de foco</div>
        </div>
        <div style={{fontSize:18,color:C.pnk}}>{open?"▲":"▼"}</div>
      </button>

      {open&&(
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:10}} className="slideup">

          {/* 1. Exercício rápido */}
          <div style={{background:C.surf,border:`1px solid ${exc.done?C.grn:C.bord}`,borderRadius:14,padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{color:C.grn,fontWeight:700,fontSize:14}}>💪 Exercício Rápido (10 reps)</div>
              {exc.done&&<Tag color={C.grn}>✓ +10 XP</Tag>}
            </div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[{id:"flexao",l:"Flexão"},{id:"agachamento",l:"Agachamento"},{id:"polichinelo",l:"Polichinelo"}].map(e=>(
                <button key={e.id} onClick={()=>setExc(x=>({...x,type:e.id,count:0,done:false}))} style={{
                  flex:1,background:exc.type===e.id?C.grn+"25":C.card,border:`1px solid ${exc.type===e.id?C.grn:C.bord}`,
                  borderRadius:10,color:exc.type===e.id?C.grn:C.mut,padding:"7px 4px",cursor:"pointer",fontSize:12,fontWeight:600
                }}>{e.l}</button>
              ))}
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{color:exc.done?C.grn:C.txt,fontWeight:800,fontSize:44,lineHeight:1}}>{exc.count}<span style={{fontSize:16,color:C.mut}}>/10</span></div>
              <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:10}}>
                <button onClick={()=>setExc(x=>({...x,count:Math.max(0,x.count-1)}))} disabled={exc.done}
                  style={{background:C.bord,border:"none",borderRadius:10,color:C.txt,width:46,height:46,cursor:"pointer",fontSize:24}}>−</button>
                <button onClick={()=>{
                  if(exc.done)return;
                  const nc=exc.count+1;
                  if(nc>=10){setExc(x=>({...x,count:10,done:true}));onXP(10,"💪 +10 XP exercício feito!");}
                  else setExc(x=>({...x,count:nc}));
                }} disabled={exc.done}
                  style={{background:C.grn+"25",border:`1px solid ${C.grn}`,borderRadius:10,color:C.grn,width:46,height:46,cursor:"pointer",fontSize:24,fontWeight:700}}>+</button>
              </div>
            </div>
          </div>

          {/* 2. Banho gelado */}
          <div style={{background:C.surf,border:`1px solid ${shower.done?C.cyan:C.bord}`,borderRadius:14,padding:16}}>

              <div style={{color:C.cyan,fontWeight:700,fontSize:14}}>🚿 Banho Gelado (30s)</div>

            </div>
            <div style={{color:C.mut,fontSize:13,lineHeight:1.5,marginBottom:12}}>

            </div>
            {shower.running&&!shower.done?(
              <div style={{textAlign:"center"}}>
                <div style={{color:C.cyan,fontWeight:800,fontSize:42}}>{shower.timer}s</div>
                <div style={{color:C.mut,fontSize:12,marginTop:4}}>Aguente! Você consegue! 🥶</div>
              </div>
            ):!shower.done?(
              <div style={{display:"flex",gap:8}}>
                <button onClick={startShower} style={{flex:2,background:C.cyan+"20",border:`1px solid ${C.cyan}`,borderRadius:10,color:C.cyan,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>⏱ Timer 30s</button>
                <button onClick={()=>{setShower(s=>({...s,done:true}));onXP(15,"🚿 +15 XP banho gelado!");}} style={{flex:1,background:"transparent",border:`1px solid ${C.bord}`,borderRadius:10,color:C.mut,padding:"10px",cursor:"pointer",fontSize:12}}>Já fiz</button>
              </div>
            ):null}

          {/* 3. Respiração quadrada */}
          <div style={{background:C.surf,border:`1px solid ${breathDone?C.pri:C.bord}`,borderRadius:14,padding:16}}>

              <div style={{color:C.pri,fontWeight:700,fontSize:14}}>🌬️ Respiração Quadrada</div>
              {breathDone&&<Tag color={C.pri}>✓ +15 XP</Tag>}
            </div>
            {!breathDone?(
              <BreathingExercise onComplete={()=>{setBreathDone(true);onXP(15,"🌬️ +15 XP respiração!");}}/>
            ):(
              <div style={{textAlign:"center",color:C.pri,padding:"20px 0",fontSize:15,fontWeight:600}}>🧘 Respiração concluída! Mente calma.</div>
            )}
          </div>

          {/* 4. Caminhada 2min */}
          <div style={{background:C.surf,border:`1px solid ${walk.done?C.grn:C.bord}`,borderRadius:14,padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{color:C.grn,fontWeight:700,fontSize:14}}>🚶 Caminhe 2 Minutos</div>
              {walk.done&&<Tag color={C.grn}>✓ +10 XP</Tag>}
            </div>
            <div style={{color:C.mut,fontSize:13,marginBottom:12}}>2 min de movimento aumenta fluxo sanguíneo no córtex pré-frontal!</div>
            {walk.running&&!walk.done?(
              <div style={{textAlign:"center"}}>
                <div style={{color:C.grn,fontWeight:800,fontSize:42}}>{Math.floor(walk.timer/60)}:{String(walk.timer%60).padStart(2,"0")}</div>
                <div style={{color:C.mut,fontSize:12,marginTop:4}}>Caminhe pelo ambiente!</div>
              </div>
            ):!walk.done?(
              <div style={{display:"flex",gap:8}}>
                <button onClick={startWalk} style={{flex:2,background:C.grn+"20",border:`1px solid ${C.grn}`,borderRadius:10,color:C.grn,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>⏱ Timer 2min</button>
                <button onClick={()=>{setWalk(s=>({...s,done:true}));onXP(10,"🚶 +10 XP caminhada!");}} style={{flex:1,background:"transparent",border:`1px solid ${C.bord}`,borderRadius:10,color:C.mut,padding:"10px",cursor:"pointer",fontSize:12}}>Já fiz</button>
              </div>
            ):null}
          </div>

          {/* 5. Música para foco */}
          <div style={{background:C.surf,border:`1px solid ${sunDone?C.amb:C.bord}`,borderRadius:14,padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{color:C.amb,fontWeight:700,fontSize:14}}>🎵 Música para Foco</div>
              {sunDone&&<Tag color={C.amb}>✓ +5 XP</Tag>}
            </div>
            <div style={{color:C.mut,fontSize:13,marginBottom:4}}>Sons que ativam ondas cerebrais alfa (foco profundo):</div>
            {["🎼 Lo-fi hip hop","🌊 Rain & thunderstorm","🔊 Binaural beats 40Hz","🎹 Instrumental clássico"].map(m=>(
              <div key={m} style={{color:C.txt,fontSize:13,padding:"4px 0",borderBottom:`1px solid ${C.bord}`}}>{m}</div>
            ))}
            {!sunDone&&<button onClick={()=>{setSunDone(true);onXP(5,"🎵 +5 XP foco musical!");}} style={{width:"100%",marginTop:12,background:C.amb+"20",border:`1px solid ${C.amb}`,borderRadius:10,color:C.amb,padding:"9px",cursor:"pointer",fontWeight:700,fontSize:13}}>Liguei a música! 🎧</button>}
          </div>

          {/* 6. Frase motivacional */}
          <div style={{background:C.surf,border:`1px solid ${quoteDone?C.pnk:C.bord}`,borderRadius:14,padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{color:C.pnk,fontWeight:700,fontSize:14}}>💬 Frase do Momento</div>
              {quoteDone&&<Tag color={C.pnk}>✓ +5 XP</Tag>}
            </div>
            <div style={{color:C.txt,fontSize:14,lineHeight:1.6,fontStyle:"italic",marginBottom:12}}>"{quote}"</div>
            {!quoteDone&&<button onClick={()=>{setQuoteDone(true);onXP(5,"💬 +5 XP motivado!");}} style={{width:"100%",background:C.pnk+"20",border:`1px solid ${C.pnk}`,borderRadius:10,color:C.pnk,padding:"9px",cursor:"pointer",fontWeight:700,fontSize:13}}>Me motivei! 🔥</button>}
          </div>

          {done>=4&&(
            <div style={{background:`linear-gradient(135deg,${C.grn}18,${C.cyan}18)`,border:`1px solid ${C.grn}40`,borderRadius:14,padding:16,textAlign:"center"}} className="fadein">
              <div style={{fontSize:32,marginBottom:6}}>🎉</div>
              <div style={{color:C.grn,fontWeight:700,fontSize:16}}>Pronto para focar!</div>
              <div style={{color:C.mut,fontSize:13,marginTop:4}}>{done}/6 atividades completas • Volte ao timer!</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
